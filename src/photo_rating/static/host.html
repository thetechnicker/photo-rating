<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhotoRank · Host</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0d;
        --surface: #1a1a2e;
        --border: #2a2a45;
        --text: #e8e8e8;
        --muted: #6b6b8a;
        --violet: #7c3aed;
        --violet-h: #9155ff;
        --amber: #f59e0b;
        --green: #22c55e;
        --red: #ef4444;
        --font-d: "Space Grotesk", sans-serif;
        --font-b: "Inter", sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-b);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        border-bottom: 1px solid var(--border);
      }
      .logo {
        font-family: var(--font-d);
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .logo span {
        color: var(--violet);
      }
      .session-badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-family: var(--font-d);
        font-weight: 600;
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 0.4rem 1rem;
        border-radius: 999px;
        font-size: 0.9rem;
      }
      .session-badge .code {
        color: var(--amber);
        letter-spacing: 0.1em;
      }
      .state-pill {
        font-size: 0.75rem;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 0.25rem 0.75rem;
        border-radius: 999px;
      }
      .state-idle {
        background: #333;
        color: var(--muted);
      }
      .state-lobby {
        background: #1a3a2e;
        color: var(--green);
      }
      .state-game {
        background: #2a1a4e;
        color: var(--violet-h);
      }
      .state-end {
        background: #3a2a00;
        color: var(--amber);
      }

      /* ── Main layout ── */
      main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ── Panels ── */
      .panel-setup,
      .panel-lobby,
      .panel-game,
      .panel-end {
        display: none;
        width: 100%;
        height: 100%;
      }
      .panel-setup.active,
      .panel-lobby.active,
      .panel-game.active,
      .panel-end.active {
        display: flex;
      }

      /* ── Setup panel ── */
      .panel-setup {
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .setup-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 1rem;
        padding: 2.5rem;
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      .setup-card h1 {
        font-family: var(--font-d);
        font-size: 1.75rem;
        font-weight: 700;
      }
      .setup-card p {
        color: var(--muted);
        font-size: 0.9rem;
        line-height: 1.5;
      }

      label {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--muted);
      }
      label span {
        color: var(--text);
      }
      input[type="text"],
      input[type="number"],
      select {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        color: var(--text);
        font-family: var(--font-b);
        font-size: 0.95rem;
        padding: 0.65rem 0.9rem;
        width: 100%;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus,
      select:focus {
        border-color: var(--violet);
      }
      select option {
        background: var(--surface);
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      /* ── Buttons ── */
      .btn {
        font-family: var(--font-d);
        font-weight: 600;
        font-size: 0.95rem;
        border: none;
        border-radius: 0.6rem;
        cursor: pointer;
        padding: 0.75rem 1.5rem;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .btn-primary {
        background: var(--violet);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: var(--violet-h);
      }
      .btn-amber {
        background: var(--amber);
        color: #000;
      }
      .btn-amber:hover:not(:disabled) {
        opacity: 0.85;
      }
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-ghost:hover:not(:disabled) {
        border-color: var(--violet);
        color: var(--violet);
      }
      .btn-full {
        width: 100%;
      }

      /* ── Lobby panel ── */
      .panel-lobby {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
      }
      .lobby-join-code {
        text-align: center;
      }
      .lobby-join-code p {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 0.5rem;
      }
      .lobby-join-code .big-code {
        font-family: var(--font-d);
        font-size: 4rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        color: var(--amber);
      }
      .player-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.6rem;
        justify-content: center;
        max-width: 600px;
      }
      .player-chip {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        font-size: 0.85rem;
        font-weight: 500;
        animation: popIn 0.2s ease;
      }
      @keyframes popIn {
        from {
          transform: scale(0.8);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      .lobby-meta {
        color: var(--muted);
        font-size: 0.85rem;
        text-align: center;
      }

      /* ── Game panel ── */
      .panel-game {
        gap: 0;
      }
      .game-image-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        gap: 1.25rem;
        overflow: hidden;
      }
      .image-frame {
        position: relative;
        max-width: 100%;
        max-height: calc(100vh - 200px);
        border-radius: 0.75rem;
        overflow: hidden;
        background: var(--surface);
        border: 1px solid var(--border);
      }
      .image-frame img {
        display: block;
        max-width: 100%;
        max-height: calc(100vh - 220px);
        object-fit: contain;
      }
      .image-pair {
        display: flex;
        gap: 1rem;
        align-items: center;
        justify-content: center;
      }
      .image-pair .image-frame {
        flex: 1;
      }
      .pair-vs {
        font-family: var(--font-d);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--muted);
        flex-shrink: 0;
      }
      .progress-bar-wrap {
        width: 100%;
        max-width: 600px;
        background: var(--surface);
        border-radius: 999px;
        height: 4px;
      }
      .progress-bar {
        height: 4px;
        border-radius: 999px;
        background: var(--violet);
        transition: width 0.4s ease;
      }
      .progress-label {
        color: var(--muted);
        font-size: 0.8rem;
      }

      /* ── Sidebar stats ── */
      .game-sidebar {
        width: 280px;
        flex-shrink: 0;
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .sidebar-section {
        padding: 1.25rem;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-section h3 {
        font-family: var(--font-d);
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        margin-bottom: 0.75rem;
      }
      .vote-count-big {
        font-family: var(--font-d);
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--violet-h);
      }
      .vote-count-big span {
        font-size: 1rem;
        color: var(--muted);
      }
      .avg-stars {
        font-family: var(--font-d);
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--amber);
      }
      .leaderboard {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        overflow-y: auto;
        flex: 1;
        padding: 1.25rem;
      }
      .lb-row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        font-size: 0.82rem;
      }
      .lb-name {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .lb-bar-wrap {
        width: 60px;
        height: 4px;
        background: var(--border);
        border-radius: 999px;
      }
      .lb-bar {
        height: 4px;
        border-radius: 999px;
        background: var(--amber);
        transition: width 0.3s;
      }
      .lb-val {
        color: var(--amber);
        font-weight: 600;
        min-width: 28px;
        text-align: right;
      }

      .sidebar-controls {
        padding: 1.25rem;
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      /* ── End panel ── */
      .panel-end {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
        text-align: center;
      }
      .panel-end h2 {
        font-family: var(--font-d);
        font-size: 2rem;
        font-weight: 700;
      }
      .panel-end p {
        color: var(--muted);
      }
      .podium {
        display: flex;
        gap: 1.5rem;
        align-items: flex-end;
        justify-content: center;
      }
      .podium-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }
      .podium-rank {
        font-family: var(--font-d);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .podium-img {
        border-radius: 0.6rem;
        object-fit: cover;
        border: 2px solid var(--border);
      }
      .podium-item:nth-child(1) .podium-img {
        width: 200px;
        height: 150px;
        border-color: var(--amber);
      }
      .podium-item:nth-child(2) .podium-img,
      .podium-item:nth-child(3) .podium-img {
        width: 150px;
        height: 110px;
      }
      .podium-score {
        font-family: var(--font-d);
        font-weight: 600;
        color: var(--amber);
      }
      .output-notice {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.6rem;
        padding: 1rem 1.5rem;
        font-size: 0.85rem;
        color: var(--muted);
        max-width: 480px;
      }
      .output-notice strong {
        color: var(--green);
      }

      /* ── Toasts ── */
      #toast {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.6rem;
        padding: 0.75rem 1.25rem;
        font-size: 0.875rem;
        color: var(--text);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
        z-index: 999;
      }
      #toast.show {
        opacity: 1;
      }
      #toast.error {
        border-color: var(--red);
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        Photo<span>Rank</span>
        <small
          style="
            font-size: 0.7rem;
            color: var(--muted);
            font-family: var(--font-b);
            font-weight: 400;
          "
          >host</small
        >
      </div>
      <div style="display: flex; align-items: center; gap: 0.75rem">
        <div class="session-badge" id="sessionBadge" style="display: none">
          Code: <span class="code" id="headerCode">—</span>
        </div>
        <span class="state-pill state-idle" id="statePill">idle</span>
      </div>
    </header>

    <main>
      <!-- SETUP -->
      <div class="panel-setup active" id="panelSetup">
        <div class="setup-card">
          <div>
            <h1>New Session</h1>
            <p style="margin-top: 0.4rem">
              Configure your photo rating session, then share the code with
              participants.
            </p>
          </div>

          <label
            ><span>Game mode</span>
            <select id="mode">
              <option value="star_rating">⭐ Star Rating (1–5)</option>
              <option value="head_to_head">⚔️ Head-to-Head</option>
            </select>
          </label>

          <label id="thresholdLabel"
            ><span
              >Winner threshold
              <small style="color: var(--muted)"
                >(avg stars ≥ this)</small
              ></span
            >
            <input
              type="number"
              id="threshold"
              value="3.5"
              min="1"
              max="5"
              step="0.1"
            />
          </label>

          <label
            ><span
              >Host image folder
              <small style="color: var(--muted)"
                >(absolute path on this machine, optional)</small
              ></span
            >
            <input
              type="text"
              id="hostDir"
              placeholder="/Users/you/Photos/shoot-2024"
            />
          </label>

          <div class="row-2">
            <label
              ><span>Per-user upload limit (MB)</span>
              <input type="number" id="perUserMb" value="50" min="1" />
            </label>
            <label
              ><span>Session upload ceiling (MB)</span>
              <input type="number" id="sessionMb" value="500" min="1" />
            </label>
          </div>

          <button class="btn btn-primary btn-full" onclick="createSession()">
            Create session →
          </button>
        </div>
      </div>

      <!-- LOBBY -->
      <div class="panel-lobby" id="panelLobby">
        <div class="lobby-join-code">
          <p>
            Share this code with participants — they open
            <strong>join.html</strong>
          </p>
          <div class="big-code" id="lobbyCode">——</div>
        </div>
        <div>
          <div class="player-grid" id="playerGrid"></div>
          <p class="lobby-meta" id="lobbyMeta" style="margin-top: 1rem">
            Waiting for players…
          </p>
        </div>
        <button class="btn btn-amber" onclick="startGame()">
          Start game →
        </button>
      </div>

      <!-- GAME -->
      <div class="panel-game" id="panelGame">
        <div class="game-image-area">
          <div id="imageDisplay"></div>
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: center;
              gap: 0.4rem;
              width: 100%;
              max-width: 600px;
            "
          >
            <div class="progress-bar-wrap">
              <div
                class="progress-bar"
                id="progressBar"
                style="width: 0%"
              ></div>
            </div>
            <span class="progress-label" id="progressLabel">0 / 0</span>
          </div>
        </div>

        <aside class="game-sidebar">
          <div class="sidebar-section">
            <h3>Votes received</h3>
            <div class="vote-count-big" id="voteCount">
              0 <span>votes</span>
            </div>
          </div>
          <div class="sidebar-section" id="starStatsSection">
            <h3>Current avg</h3>
            <div class="avg-stars" id="avgStars">—</div>
          </div>
          <h3
            style="
              padding: 1.25rem 1.25rem 0.5rem;
              font-family: var(--font-d);
              font-size: 0.8rem;
              font-weight: 600;
              text-transform: uppercase;
              letter-spacing: 0.08em;
              color: var(--muted);
            "
          >
            Leaderboard
          </h3>
          <div class="leaderboard" id="leaderboard"></div>
          <div class="sidebar-controls">
            <button class="btn btn-primary" onclick="nextImage()">
              Next →
            </button>
            <button class="btn btn-ghost" onclick="finishSession()">
              End &amp; export
            </button>
          </div>
        </aside>
      </div>

      <!-- END -->
      <div class="panel-end" id="panelEnd">
        <h2>Session complete</h2>
        <p id="endSubtitle"></p>
        <div class="podium" id="podium"></div>
        <div class="output-notice" id="outputNotice"></div>
        <button class="btn btn-ghost" onclick="location.reload()">
          New session
        </button>
      </div>
    </main>

    <div id="toast"></div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────────
      let sessionCode = null;
      let currentMode = "star_rating";
      let pollTimer = null;

      // ── API helpers ────────────────────────────────────────────────────────────
      async function api(method, path, body) {
        const opts = {
          method,
          headers: { "Content-Type": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || res.statusText);
        return data;
      }

      function toast(msg, err = false) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "show" + (err ? " error" : "");
        clearTimeout(el._t);
        el._t = setTimeout(() => (el.className = ""), 2800);
      }

      // ── Mode toggle: update threshold hint ────────────────────────────────────
      document.getElementById("mode").addEventListener("change", (e) => {
        const lbl = document
          .getElementById("thresholdLabel")
          .querySelector("small");
        const inp = document.getElementById("threshold");
        if (e.target.value === "star_rating") {
          lbl.textContent = "(avg stars ≥ this)";
          inp.min = 1;
          inp.max = 5;
          inp.step = 0.1;
          inp.value = 3.5;
        } else {
          lbl.textContent = "(win-rate ≥ this, 0–1)";
          inp.min = 0;
          inp.max = 1;
          inp.step = 0.05;
          inp.value = 0.5;
        }
      });

      // ── Create session ─────────────────────────────────────────────────────────
      async function createSession() {
        currentMode = document.getElementById("mode").value;
        const body = {
          mode: currentMode,
          threshold: parseFloat(document.getElementById("threshold").value),
          max_per_user_mb: parseFloat(
            document.getElementById("perUserMb").value,
          ),
          max_session_mb: parseFloat(
            document.getElementById("sessionMb").value,
          ),
          host_image_dir:
            document.getElementById("hostDir").value.trim() || null,
        };
        try {
          const data = await api("POST", "/session/create", body);
          sessionCode = data.code;
          document.getElementById("headerCode").textContent = sessionCode;
          document.getElementById("lobbyCode").textContent = sessionCode;
          document.getElementById("sessionBadge").style.display = "flex";
          setPanel("lobby");
          startPolling();
        } catch (e) {
          toast(e.message, true);
        }
      }

      // ── Start game ─────────────────────────────────────────────────────────────
      async function startGame() {
        try {
          await api("POST", `/session/${sessionCode}/start`);
          setPanel("game");
        } catch (e) {
          toast(e.message, true);
        }
      }

      // ── Advance image ──────────────────────────────────────────────────────────
      async function nextImage() {
        try {
          await api("POST", `/session/${sessionCode}/next`);
        } catch (e) {
          toast(e.message, true);
        }
      }

      // ── Finish session ─────────────────────────────────────────────────────────
      async function finishSession() {
        if (!confirm("End the game and export winners?")) return;
        try {
          const data = await api("POST", `/session/${sessionCode}/finish`);
          showEnd(data);
        } catch (e) {
          toast(e.message, true);
        }
      }

      // ── Polling ────────────────────────────────────────────────────────────────
      function startPolling() {
        clearInterval(pollTimer);
        pollTimer = setInterval(poll, 1500);
      }

      async function poll() {
        if (!sessionCode) return;
        try {
          const data = await api("GET", `/session/${sessionCode}/state`);
          updateStatePill(data.state);

          if (data.state === "lobby") updateLobby(data);
          if (data.state === "game") updateGame(data);
          if (data.state === "end") clearInterval(pollTimer);
        } catch (e) {
          /* silent */
        }
      }

      // ── UI: lobby ──────────────────────────────────────────────────────────────
      function updateLobby(data) {
        const grid = document.getElementById("playerGrid");
        grid.innerHTML = data.players
          .map((p) => `<div class="player-chip">${p}</div>`)
          .join("");
        document.getElementById("lobbyMeta").textContent =
          data.players.length === 0
            ? "Waiting for players…"
            : `${data.players.length} player${data.players.length > 1 ? "s" : ""} in lobby`;
      }

      // ── UI: game ───────────────────────────────────────────────────────────────
      function updateGame(data) {
        const ps = data.plugin_state;
        if (!ps) return;

        // progress
        const pct =
          ps.total_images > 0
            ? Math.round(((ps.image_index + 1) / ps.total_images) * 100)
            : 0;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressLabel").textContent =
          `${ps.image_index + 1} / ${ps.total_images}`;

        // image display
        const display = document.getElementById("imageDisplay");
        if (ps.mode === "head_to_head" && ps.pair) {
          display.className = "image-pair";
          display.innerHTML = ps.pair
            .map(
              (f) =>
                `<div class="image-frame"><img src="/images/${sessionCode}/${encodeURIComponent(filename(f))}" alt="${filename(f)}"></div>`,
            )
            .join('<div class="pair-vs">VS</div>');
        } else if (ps.current_image) {
          display.className = "image-frame";
          display.innerHTML = `<img src="/images/${sessionCode}/${encodeURIComponent(filename(ps.current_image))}" alt="${filename(ps.current_image)}">`;
        }

        // vote count
        document.getElementById("voteCount").innerHTML =
          `${ps.vote_count ?? "—"} <span>votes</span>`;

        // star avg
        const starSection = document.getElementById("starStatsSection");
        if (ps.mode === "star_rating") {
          starSection.style.display = "";
          document.getElementById("avgStars").textContent =
            ps.current_avg != null ? `${ps.current_avg} ★` : "—";
        } else {
          starSection.style.display = "none";
        }

        // leaderboard
        const scores = ps.scores || ps.win_rates || {};
        const entries = Object.entries(scores)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 10);
        const max = entries[0]?.[1] || 1;
        document.getElementById("leaderboard").innerHTML = entries
          .map(
            ([f, v]) =>
              `<div class="lb-row">
      <span class="lb-name">${filename(f)}</span>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round((v / max) * 100)}%"></div></div>
      <span class="lb-val">${v}</span>
    </div>`,
          )
          .join("");
      }

      // ── UI: end ────────────────────────────────────────────────────────────────
      function showEnd(data) {
        clearInterval(pollTimer);
        setPanel("end");
        document.getElementById("endSubtitle").textContent =
          `${data.winners.length} winner${data.winners.length !== 1 ? "s" : ""} selected`;

        const top3 = data.winners.slice(0, 3);
        const ranks = ["🥇 1st", "🥈 2nd", "🥉 3rd"];
        document.getElementById("podium").innerHTML = top3
          .map(
            (f, i) =>
              `<div class="podium-item">
      <span class="podium-rank">${ranks[i]}</span>
      <img class="podium-img" src="/images/${sessionCode}/${encodeURIComponent(f)}" alt="${f}">
      <span class="podium-score">${f}</span>
    </div>`,
          )
          .join("");

        document.getElementById("outputNotice").innerHTML =
          `<strong>✓ Winners copied</strong> to <code>${data.output_dir}</code>`;
      }

      // ── Helpers ────────────────────────────────────────────────────────────────
      function filename(path) {
        return path.split("/").pop().split("\\").pop();
      }

      function setPanel(name) {
        ["setup", "lobby", "game", "end"].forEach((p) => {
          document
            .getElementById("panel" + p.charAt(0).toUpperCase() + p.slice(1))
            .classList.toggle("active", p === name);
        });
      }

      function updateStatePill(state) {
        const pill = document.getElementById("statePill");
        pill.textContent = state;
        pill.className = `state-pill state-${state}`;
      }
    </script>
  </body>
</html>
